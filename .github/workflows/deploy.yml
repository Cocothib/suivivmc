name: Deploy to OVH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.cluster121.hosting.ovh.net
          username: zbpbasv
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./www/suivivmc/
          exclude: |
            .git*
            .git*/**
            README.md
            .github/**
